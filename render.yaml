database:
  - name: fastapi-dbb
    databaseName: fastapi-tutorial
    user: fastapi-user
    plan: free
    ipAllowList: []
  
services:
  - type: web
    name: fastapi-tutorial
    runtime: python
    plan: free
    buildCommand: "pip install uv && uv sync"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.2
      - key: DATABASE_URL
        fromDatabase: 
          name: fastapi-dbb
          property: connectionString